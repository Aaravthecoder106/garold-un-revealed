<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garold AI</title>

<style>
/* OLED BLACK THEME */
body {
    background-color: #000000;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 0;

    height: 100vh;
    display: flex;
    flex-direction: column;

    /* ❌ important fix: DO NOT block layout */
    overflow: hidden;
}

.top-branding {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 15px;
    font-weight: 600;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
}

.top-branding svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

#chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    
    /* 🌟 Fixed parent flex overflow issue */
    min-height: 0; 
}

/* 🔥 FIXED CHAT SCROLL AREA */
#chatbox {
    flex: 1;
    min-height: 0;   /* IMPORTANT */
    overflow-y: auto;
    scroll-behavior: smooth; /* Enables smooth native scrolling */

    padding: 80px 20px 20px 20px;
    display: none;
    flex-direction: column;
    gap: 25px;
}

/* smooth scrollbar hidden */
#chatbox::-webkit-scrollbar {
    display: none;
}

/* 🌟 Added smooth slide-up animation for messages */
.message {
    max-width: 85%;
    padding: 12px 18px;
    border-radius: 20px;
    line-height: 1.6;
    word-wrap: break-word;
    opacity: 0; /* Start hidden for animation */
    animation: messageFadeIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
}

.user-message {
    align-self: flex-end;
    background-color: #1a1a1a;
    border: 1px solid #333;
}

.ai-message {
    align-self: flex-start;
    color: #ececec;
    white-space: pre-wrap;
}

.bottom-area {
    padding: 20px;
    background-color: #000;
    border-top: 1px solid #222;
}

.main-interface {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 20px;
    transition: opacity 0.3s ease;
}

h2 {
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 30px;
}

.search-wrapper {
    position: relative;
    width: 100%;
    display: flex;
    align-items: center;
}

input {
    width: 100%;
    background-color: #121212;
    border: 1px solid #333;
    border-radius: 35px;
    /* Adjusted right padding since mic is gone */
    padding: 18px 70px 18px 25px; 
    color: white;
    font-size: 17px;
    outline: none;
    transition: border-color 0.2s ease;
}

input:focus {
    border-color: #555;
}

.btn-group {
    position: absolute;
    right: 10px;
    display: flex;
    gap: 10px;
}

.icon-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    transition: transform 0.2s ease, color 0.2s ease;
}

.icon-btn:hover {
    transform: scale(1.1);
    color: #aaa;
}

.send-btn {
    background-color: #007bff;
    color: white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
}

.send-btn:hover {
    background-color: #0056b3;
    color: white;
}

/* 🌟 Keyframes for smooth animations */
@keyframes messageFadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes uiFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.fade-in {
    animation: uiFadeIn 0.5s ease forwards;
}
</style>
</head>

<body>

<div class="top-branding">
 Garold AI
</div>

<div id="chat-container">

    <div id="main-ui" class="main-interface">
        <h2>What are you working on?</h2>

        <div class="search-wrapper">
            <input id="userInput" placeholder="Message Garold..."
                   onkeypress="if(event.key==='Enter')send('userInput')">

            <div class="btn-group">
                <button class="icon-btn send-btn" onclick="send('userInput')">↑</button>
            </div>
        </div>
    </div>

    <div id="chatbox"></div>

    <div id="bottom-bar" class="bottom-area" style="display:none;">
        <div class="search-wrapper">
            <input id="secondaryInput"
                   placeholder="Message Garold..."
                   onkeypress="if(event.key==='Enter')send('secondaryInput')">

            <div class="btn-group">
                <button class="icon-btn send-btn" onclick="send('secondaryInput')">↑</button>
            </div>
        </div>
    </div>

</div>

<script>
const chatbox = document.getElementById("chatbox");
const mainUi = document.getElementById("main-ui");
const bottomBar = document.getElementById("bottom-bar");

function scrollToBottom() {
    chatbox.scrollTo({
        top: chatbox.scrollHeight,
        behavior: 'smooth'
    });
}

function addMsg(text, sender) {
    const div = document.createElement("div");
    div.className = `message ${sender}-message`;
    div.innerText = text;

    chatbox.appendChild(div);

    // 🌟 Scroll immediately, and once more just to ensure smooth animation tracking
    requestAnimationFrame(() => {
        scrollToBottom();
        setTimeout(scrollToBottom, 150); 
    });
}

async function send(inputId) {
    const input = document.getElementById(inputId);
    const val = input.value.trim();
    if (!val) return;

    // Handle UI transition on first message
    if (mainUi.style.display !== "none") {
        mainUi.style.display = "none";
        
        chatbox.style.display = "flex";
        chatbox.classList.add("fade-in");
        
        bottomBar.style.display = "block";
        bottomBar.classList.add("fade-in");
        
        // Ensure secondary input gets focus after transition
        document.getElementById("secondaryInput").focus();
    }

    addMsg(val, "user");
    input.value = "";

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: val})
        });

        const data = await res.json();

        addMsg(data.response || "No response", "ai");

    } catch (e) {
        // Fallback for demonstration purposes if backend isn't connected
        setTimeout(() => {
            addMsg("Server error: Make sure your backend is running to receive real responses.", "ai");
        }, 600);
    }
}
</script>

</body>
</html>
